<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Territory Runner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="icon" href="images/runner.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-base-200">
    <header class="border-b border-base-300 bg-base-100">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <h1 class="text-xl font-bold">Territory Runner</h1>

        <button
          type="button"
          class="btn btn-ghost btn-sm md:hidden"
          data-menu-toggle
          data-menu-target="mobileMenu"
          aria-controls="mobileMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <nav class="hidden gap-2 md:flex">
          <a href="run.html" class="btn btn-sm btn-primary">Run</a>
          <a href="leaderboard.html" class="btn btn-sm btn-outline">Leaderboard</a>
          <a href="login.html" class="btn btn-sm btn-ghost">Login</a>
          <a href="signup.html" class="btn btn-sm btn-secondary">Sign up</a>
        </nav>
      </div>

      <nav id="mobileMenu" class="mx-auto hidden max-w-6xl space-y-2 px-4 pb-4 md:hidden">
        <a href="run.html" class="btn btn-primary btn-sm w-full">Run</a>
        <a href="leaderboard.html" class="btn btn-outline btn-sm w-full">Leaderboard</a>
        <a href="login.html" class="btn btn-ghost btn-sm w-full">Login</a>
        <a href="signup.html" class="btn btn-secondary btn-sm w-full">Sign up</a>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-14">
      <section class="hero rounded-box bg-base-100 shadow-sm">
        <div class="hero-content py-16 text-center">
          <div class="max-w-2xl">
            <h2 class="text-3xl font-bold md:text-5xl">Territory Runner </h2>
            <p class="mt-4 text-base-content/80">
              This is  Fun Run.. Are you ready to rock and roll?
            </p>
            <div class="mt-8 flex flex-wrap justify-center gap-3">
              <a href="run.html" class="btn btn-primary">Go to Run</a>
              <a href="leaderboard.html" class="btn btn-outline">View Leaderboard</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
