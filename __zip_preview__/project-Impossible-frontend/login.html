<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Territory Runner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
     <link rel="icon" href="images/runner.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-base-200">
    <main class="mx-auto flex min-h-screen max-w-md items-center px-4 py-10">
      <section class="card w-full bg-base-100 shadow-lg">
        <div class="card-body">
          <a href="index.html" class="btn btn-ghost btn-sm w-fit">Back to Home</a>
          <h1 class="card-title text-2xl">Login</h1>

          <form id="loginForm" class="mt-2 space-y-4">
            <label class="form-control w-full">
              <span class="label-text mb-1">Username or Email</span>
              <input
                type="text"
                id="identity"
                class="input input-bordered w-full"
                placeholder="Enter username or email"
                required
              />
            </label>

            <label class="form-control w-full">
              <span class="label-text mb-1">Password</span>
              <input
                type="password"
                id="password"
                class="input input-bordered w-full"
                placeholder="Enter password"
                required
              />
            </label>

            <button type="submit" class="btn btn-primary w-full">Login</button>
          </form>

          <div id="loginMessage" class="alert mt-3 hidden"></div>

          <p class="mt-2 text-sm text-base-content/70">
            No account? <a href="signup.html" class="link link-primary">Sign up</a>
          </p>
        </div>
      </section>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
